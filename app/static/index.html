<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wui v2 - Dashboard</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; background-color: #f4f4f9; }
        .header { background: #333; color: #fff; padding: 10px 20px; margin: -20px -20px 20px -20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .card { background: #fff; padding: 20px; margin-bottom: 20px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { margin: 0; }
        .status { color: green; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Wui v2 Dashboard</h1>
    </div>
    <div class="container">
        <div class="card">
            <h2>Bienvenido a Wui v2</h2>
            <p>Estado del sistema: <span class="status">Activo</span></p>
            <p>Versión: 2.0.0</p>
        </div>
    </div>
</body>
</html>
